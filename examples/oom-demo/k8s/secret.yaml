# ШАБЛОН — не заполняй здесь реальные значения, файл в git.
# Создай Secret через Makefile:
#   make k8s-secret SLACK_WEBHOOK_URL=... TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=...
#
# Или вручную:
#   kubectl create secret generic oom-demo-notifiers \
#     --namespace=oom-demo \
#     --from-literal=SLACK_WEBHOOK_URL=https://hooks.slack.com/... \
#     --from-literal=TELEGRAM_BOT_TOKEN=123456:ABC \
#     --from-literal=TELEGRAM_CHAT_ID=-100123456789
apiVersion: v1
kind: Secret
metadata:
  name: oom-demo-notifiers
  namespace: oom-demo
stringData:
  SLACK_WEBHOOK_URL: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
